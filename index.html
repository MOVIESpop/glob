<style>
#matrix-canvas { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.15; pointer-events: none; }
#root { position: relative; z-index: 10; }
.boot-screen { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: monospace; color: #00ff41; }

<body class="bg-black overflow-hidden m-0 p-0">
<div id="boot-loader" class="boot-screen">
<div id="boot-text" class="text-[10px] uppercase tracking-widest mb-4"></div>

<script src="https://unpkg.com"></script>
<script src="https://unpkg.com"></script>

<script>
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@&*";
const fontSize = 14; const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);
function draw() {
ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
for (let i = 0; i < drops.length; i++) {
const text = letters.charAt(Math.floor(Math.random() * letters.length));
ctx.fillText(text, i * fontSize, drops[i] * fontSize);
if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
drops[i]++;
}
}
setInterval(draw, 33);

const logs = ["> INJECTING CORE...", "> BYPASSING FIREWALL...", "> LINKING NEURAL_NET...", "> ACCESS GRANTED."];
let lIdx = 0;
function boot() {
if (lIdx < logs.length) {
document.getElementById('boot-text').innerText = logs[lIdx];
document.getElementById('boot-bar').style.width = (lIdx + 1) * 25 + "%";
lIdx++; setTimeout(boot, 600);
} else {
setTimeout(() => document.getElementById('boot-loader').style.display = 'none', 500);
}
}
boot();
lucide.createIcons();
</script>
<script type="text/babel" src="script.js"></script>
