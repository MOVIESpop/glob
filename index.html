<!-- סקריפט ניהול אינדקס (Matrix + Boot Logic) -->
<script>
// 1. אפקט מטריקס (Canvas)
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@&*";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = "#0f0";
ctx.font = fontSize + "px monospace";
for (let i = 0; i < drops.length; i++) {
const text = letters.charAt(Math.floor(Math.random() * letters.length));
ctx.fillText(text, i * fontSize, drops[i] * fontSize);
if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
drops[i]++;
}
}
setInterval(drawMatrix, 33);

// 2. לוג טעינה (Boot Sequence)
const logs = [
"> CONNECTING TO HQ_ISR_NODE...",
"> BYPASSING GOVERNMENT FIREWALLS...",
"> DECRYPTING SOVEREIGN_PROTOCOLS...",
"> ACCESSING SHADOW_ASSETS...",
"> INJECTING NEXUS_CORE_V4...",
"> NEURAL LINK ESTABLISHED."
];
let logIndex = 0;
const logContainer = document.getElementById('boot-log');

function typeLog() {
if (logIndex < logs.length) {
const p = document.createElement('p');
p.textContent = logs[logIndex];
logContainer.appendChild(p);
logIndex++;
setTimeout(typeLog, 400);
} else {
setTimeout(() => {
document.getElementById('boot-sequence').style.display = 'none';
}, 1000);
}
}
typeLog();

// אתחול אייקונים
lucide.createIcons();
</script>

<!-- חיבור ה-app.js שלך -->

root.render(<App />);
</script>
