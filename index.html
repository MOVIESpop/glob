<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>מערכת הארגון</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="emergencyBanner"></div>

<div id="loginScreen">
  <h2>כניסה</h2>
  <input id="loginUser" placeholder="שם משתמש">
  <input id="loginPass" type="password" placeholder="סיסמה">
  <button onclick="login()">כניסה</button>
</div>

<div id="app" class="hidden">

  <h1>שליטה ארגונית</h1>
  <div id="profile"></div>

  <div class="menu">
    <button onclick="show('war')">חדר מלחמה</button>
    <button onclick="show('bank')">בנק</button>
    <button onclick="show('laws')">חוקים</button>
    <button onclick="show('actions')">פעולות</button>
    <button onclick="sendEmergency()">🚨</button>
  </div>

  <div id="adminPanel" class="hidden">
    <h3>ניהול משתמשים</h3>
    <input id="newUser" placeholder="שם">
    <input id="newPass" placeholder="סיסמה">
    <select id="newRole">
      <option>סוכן</option>
      <option>רכז</option>
      <option>מפקד</option>
      <option>גנרל</option>
    </select>
    <button onclick="createUser()">צור</button>
  </div>

  <div id="war" class="section"></div>
  <div id="bank" class="section hidden"></div>
  <div id="laws" class="section hidden"></div>
  <div id="actions" class="section hidden"></div>

</div>

<script src="script.js"></script>
</body>
</html>
